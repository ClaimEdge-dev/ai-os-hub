# NOTE: This file should be moved to .github/workflows/security-check.yml
# The .github/workflows directory does not yet exist in this repo.
# To activate: create .github/workflows/ directory and move this file there.

name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@60dcd42ba0832b7ae56abb5dc9afe6763a907d2a
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  skill-security-audit:
    name: Skill Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Audit SKILL.md files for security issues
        run: |
          REPORT_DIR="security-reports"
          mkdir -p $REPORT_DIR
          REPORT_FILE="$REPORT_DIR/skill-audit-report.md"
          echo "# Skill Security Audit Report" > $REPORT_FILE
          echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0
          for file in $(find . -name "SKILL.md" -o -name "*.skill.md"); do
            echo "## $file" >> $REPORT_FILE
            if grep -inE '(api[_-]?key|password|token|secret)\s*[=:]\s*["'\'''][a-zA-Z0-9]{16,}' "$file" 2>/dev/null; then
              echo "- **CRITICAL**: Hardcoded credentials detected" >> $REPORT_FILE
              CRITICAL=$((CRITICAL + 1))
            fi
            if grep -inE '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b' "$file" 2>/dev/null | grep -v "example.com\|test.com"; then
              echo "- **HIGH**: Email addresses (potential PII) detected" >> $REPORT_FILE
              HIGH=$((HIGH + 1))
            fi
            if ! grep -iq "human review\|human-in-the-loop\|human signoff\|review gate" "$file" 2>/dev/null; then
              echo "- **MEDIUM**: No human review gate documented" >> $REPORT_FILE
              MEDIUM=$((MEDIUM + 1))
            fi
            echo "" >> $REPORT_FILE
          done
          echo "## Summary" >> $REPORT_FILE
          echo "- Critical: $CRITICAL" >> $REPORT_FILE
          echo "- High: $HIGH" >> $REPORT_FILE
          echo "- Medium: $MEDIUM" >> $REPORT_FILE
          echo "- Low: $LOW" >> $REPORT_FILE
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

      - name: Upload audit report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45f07c
        with:
          name: skill-security-audit
          path: security-reports/
          retention-days: 30

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check for package.json
        id: check-npm
        run: |
          if [ -f "package.json" ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi

      - name: Run npm audit
        if: steps.check-npm.outputs.exists == 'true'
        run: |
          npm audit --audit-level=high --json > security-reports/npm-audit.json || true
          npm audit --audit-level=high || true

      - name: Check for requirements.txt
        id: check-pip
        run: |
          if [ -f "requirements.txt" ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi

      - name: Run pip-audit
        if: steps.check-pip.outputs.exists == 'true'
        run: |
          pip install pip-audit
          pip-audit --format=json --output=security-reports/pip-audit.json || true
          pip-audit || true

      - name: Dependency Review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019
        with:
          fail-on-severity: moderate

      - name: Upload dependency reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45f07c
        with:
          name: dependency-check
          path: security-reports/
          retention-days: 30

  notion-sync-verify:
    name: Notion Sync Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Verify Notion database schema
        if: env.NOTION_TOKEN != ''
        run: |
          RESPONSE=$(curl -s -X GET "https://api.notion.com/v1/databases/${{ env.NOTION_DATABASE_ID }}" \
            -H "Authorization: Bearer ${{ env.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28")
          if echo "$RESPONSE" | grep -q "error"; then echo "Notion API error: $RESPONSE"; exit 1; fi
          echo "Notion database schema verified successfully"

      - name: Skip if no Notion token
        if: env.NOTION_TOKEN == ''
        run: |
          echo "NOTION_TOKEN not configured — skipping Notion sync verification"
          echo "To enable: add NOTION_TOKEN secret and NOTION_DATABASE_ID variable"